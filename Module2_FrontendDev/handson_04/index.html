<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Portal</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1 id="title">Student Portal</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Courses</a>
                <a href="#">Grades</a>
                <a href="#">Profile</a>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h2>Welcome Students!</h2>
                <p id="message">Learn. Practice. Grow</p>
                <button id="btn">Explore Courses</button>
            </section>
            <section class="courses">
                <h2>Available Courses</h2>
                <div id="courseContainer" class="course-container">
                    <div class="card">
                        <h3>Frontend Development</h3>
                        <p>HTML CSS JavaScript</p>
                    </div>
                    <div class="card">
                        <h3>Python</h3>
                        <p>Programming Fundamentals</p>
                    </div>
                    <div class="card">
                        <h3>AI & ML</h3>
                        <p>Machine Learning Basics</p>
                    </div>
                </div>                
            </section>
            <section class="api-selection">
                <h2>Today's Task</h2>
                <div id="taskContainer"></div>
            </section>
        </main>
        <footer>
            <p>© 2026 Student Portal</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
